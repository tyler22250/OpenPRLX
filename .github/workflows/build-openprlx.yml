name: build-openprlx

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_CONFIGURATION: Release

# Least privilege at the workflow level; the release job below opts up to contents: write.
permissions:
  contents: read

jobs:
  build:
    # Pin to VS2022, NOT windows-latest: latest now ships VS18/MSVC 14.51 (VS2026
    # class), which fails to build the pinned vcpkg ports (libsodium builds a
    # vs2022 .vcxproj that doesn't compile on the v18 toolset → BUILD_FAILED). The
    # pinned vcpkg release + ports are known-good on VS2022.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: ilammy/msvc-dev-cmd@v1.4.1

      - name: Cache vcpkg/installed
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: vcpkg/installed
          # Key on inputs known at restore time (pinned vcpkg tag + the vcpkg.json version
          # pin), NOT vcpkg/installed/** which does not exist yet at this step — hashing a
          # missing path collapsed the key to a constant and froze the cache after run 1.
          key: ${{ runner.os }}-vcpkg-static-2026.06.24-${{ hashFiles('vcpkg.json') }}
          restore-keys: ${{ runner.os }}-vcpkg-static-2026.06.24-

      - name: Build openprlx
        run: |
          if (-Not (Test-Path -Path vcpkg )) { New-Item -ItemType Directory -Path vcpkg }
          cd vcpkg
          git init
          git remote add origin https://github.com/microsoft/vcpkg.git
          # Pin a RECENT vcpkg RELEASE tag (shallow). An old commit referenced a
          # pkgconf package version MSYS2's mirrors no longer host (every mirror
          # 404'd → libsodium's build BUILD_FAILED). Release tags are tested
          # snapshots with live download URLs.
          git fetch --depth 1 origin refs/tags/2026.06.24
          git checkout FETCH_HEAD
          .\bootstrap-vcpkg.bat
          .\vcpkg integrate install
          # GUI deps (ffmpeg/qt5/sdl2) intentionally dropped — headless build.
          # libpcap also dropped: the ONLY pcap consumer in the vendored driver is
          # 3rd/rtl8812au-monitor-pcap/src/main.cpp, which CMakeLists excludes from the
          # build — and libpcap:x64-windows fails to build on the runner's toolchain,
          # which aborted the whole install. We link libusb + sodium + ws2_32 only.
          # Pin the x64-windows-static triplet explicitly: classic-mode `vcpkg install`
          # with no triplet defaults to x86-windows, while the default VS generator builds
          # x64 -> architecture/link mismatch. The static triplet links libusb/libsodium
          # statically so the published exe ships as a single self-contained binary.
          # --classic is REQUIRED: vcpkg walks parent dirs for a vcpkg.json, finds the repo
          # root manifest, and would switch to manifest mode (which rejects package args:
          # "In manifest mode, vcpkg install does not support individual package arguments").
          # CI installs classically + pins via the tag; vcpkg.json is for local manifest builds.
          .\vcpkg install libusb:x64-windows-static libsodium:x64-windows-static --classic
          cd ..
          # VCPKG_MANIFEST_MODE=OFF: use the classic-installed packages above. vcpkg.json
          # (manifest mode) is for local/dev reproducible builds; CI pins via the tag.
          cmake "-DCMAKE_TOOLCHAIN_FILE=$env:GITHUB_WORKSPACE/vcpkg/scripts/buildsystems/vcpkg.cmake" -A x64 -DVCPKG_TARGET_TRIPLET=x64-windows-static -DVCPKG_MANIFEST_MODE=OFF -S ./ -B build
          cmake --build build --config Release --target openprlx

      - name: Stage dist (self-contained exe)
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          # openprlx.exe lands in build/Release with the VS (MSBuild) generator. With the
          # x64-windows-static triplet + static CRT it is fully self-contained (no DLLs).
          $exe = Get-ChildItem -Path build -Recurse -Filter openprlx.exe | Select-Object -First 1
          if (-not $exe) { throw 'openprlx.exe not found under build/ — the build step failed.' }
          Copy-Item $exe.FullName dist/
          # Assert self-containment: the exe must not depend on the vcpkg or VC++ runtime DLLs.
          $deps = (dumpbin /dependents $exe.FullName) -join "`n"
          if ($deps -match 'libusb-1\.0\.dll|libsodium\.dll|vcruntime140|msvcp140') {
            throw "openprlx.exe is not self-contained — it links a runtime DLL:`n$deps"
          }
          Get-ChildItem dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openprlx-win64
          path: dist/

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write   # create the GitHub Release + upload assets
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: openprlx-win64
          path: dist/
      - name: Zip
        run: Compress-Archive -Path dist/* -DestinationPath openprlx-win64.zip
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: openprlx-win64.zip
